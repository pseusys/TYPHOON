name: typhoon-eval

x-profile-env: &profile-env
  TRAFFIC_PROFILE:        ${TRAFFIC_PROFILE:-}
  PROFILE_CHUNK_C2S:      ${PROFILE_CHUNK_C2S:-}
  PROFILE_CHUNK_S2C:      ${PROFILE_CHUNK_S2C:-}
  PROFILE_CHUNK_C2S_MIN:  ${PROFILE_CHUNK_C2S_MIN:-}
  PROFILE_CHUNK_C2S_MAX:  ${PROFILE_CHUNK_C2S_MAX:-}
  PROFILE_CHUNK_S2C_MIN:  ${PROFILE_CHUNK_S2C_MIN:-}
  PROFILE_CHUNK_S2C_MAX:  ${PROFILE_CHUNK_S2C_MAX:-}
  PROFILE_IAT_C2S_MS:     ${PROFILE_IAT_C2S_MS:-}
  PROFILE_IAT_S2C_MS:     ${PROFILE_IAT_S2C_MS:-}
  PROFILE_IAT_C2S_MIN_MS: ${PROFILE_IAT_C2S_MIN_MS:-}
  PROFILE_IAT_C2S_MAX_MS: ${PROFILE_IAT_C2S_MAX_MS:-}
  PROFILE_IAT_S2C_MIN_MS: ${PROFILE_IAT_S2C_MIN_MS:-}
  PROFILE_IAT_S2C_MAX_MS: ${PROFILE_IAT_S2C_MAX_MS:-}
  PROFILE_BYTES_C2S:      ${PROFILE_BYTES_C2S:-10485760}
  PROFILE_BYTES_S2C:      ${PROFILE_BYTES_S2C:-0}
  PROFILE_DURATION_S:     ${PROFILE_DURATION_S:-60}
  PROFILE_FAKE_BODY_MODE: ${PROFILE_FAKE_BODY_MODE:-}
  PROFILE_FAKE_BODY_CONST: ${PROFILE_FAKE_BODY_CONST:-}
  PROFILE_FAKE_BODY_MIN:  ${PROFILE_FAKE_BODY_MIN:-}
  PROFILE_FAKE_BODY_MAX:  ${PROFILE_FAKE_BODY_MAX:-}
  PROFILE_FAKE_HEADER_LEN: ${PROFILE_FAKE_HEADER_LEN:-}
  PROFILE_BURSTY:         ${PROFILE_BURSTY:-0}
  PROFILE_BURST_COUNT:    ${PROFILE_BURST_COUNT:-1}
  PROFILE_BURST_IDLE_S:   ${PROFILE_BURST_IDLE_S:-0}
  PROFILE_DECOYS_ENABLED: ${PROFILE_DECOYS_ENABLED:-1}
  PROFILE_ID_LENGTH:      ${PROFILE_ID_LENGTH:-}
  LAT_COUNT:              ${LAT_COUNT:-}
  LAT_INTERVAL_MS:        ${LAT_INTERVAL_MS:-}
  LAT_SIZE:               ${LAT_SIZE:-}
  LAT_RECV_TIMEOUT_MS:    ${LAT_RECV_TIMEOUT_MS:-}

volumes:
  eval_keys: {}

networks:
  net_left:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

  net_right:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24


services:

  observer:
    init: true
    image: typhoon-eval-observer
    build:
      context: ../observer
    environment:
      PROTOCOL:        ${PROTOCOL}
      PROTOCOL_SUFFIX: ${PROTOCOL_SUFFIX:-}
    networks:
      net_left:
        ipv4_address: 172.20.0.2
      net_right:
        ipv4_address: 172.21.0.2
    privileged: true
    pid: "host"
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.disable_ipv6=1
    volumes:
      - ${CAPTURES_DIR}:/captures
    healthcheck:
      test: ["CMD", "pgrep", "-x", "tcpdump"]
      interval: 1s
      timeout: 3s
      retries: 15
      start_period: 3s

  server:
    init: true
    image: ${SERVER_IMAGE}
    networks:
      net_right:
        ipv4_address: 172.21.0.10
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    environment:
      <<: *profile-env
      OBSERVER_GW: 172.21.0.2
      CERT_HOST:   172.21.0.10
      OBFS4_IAT_MODE: ${OBFS4_IAT_MODE:-}
      IDLE_TIMEOUT_S: ${IDLE_TIMEOUT_S:-30}
      RUST_LOG: ${RUST_LOG:-}
      TYPHOON_DRAIN_CHANNEL_CAPACITY:  ${TYPHOON_DRAIN_CHANNEL_CAPACITY:-}
      TYPHOON_RECEIVE_BUFFER_SIZE:     ${TYPHOON_RECEIVE_BUFFER_SIZE:-}
      TYPHOON_DECOY_HEAVY_BASE_RATE:   ${TYPHOON_DECOY_HEAVY_BASE_RATE:-}
      TYPHOON_DECOY_NOISY_BASE_RATE:   ${TYPHOON_DECOY_NOISY_BASE_RATE:-}
      TYPHOON_DECOY_SPARSE_BASE_RATE:  ${TYPHOON_DECOY_SPARSE_BASE_RATE:-}
      TYPHOON_DECOY_SMOOTH_BASE_RATE:  ${TYPHOON_DECOY_SMOOTH_BASE_RATE:-}
    volumes:
      - eval_keys:/keys
    depends_on:
      observer:
        condition: service_healthy

  client:
    init: true
    image: ${CLIENT_IMAGE}
    networks:
      net_left:
        ipv4_address: 172.20.0.10
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    environment:
      <<: *profile-env
      SERVER_HOST:    172.21.0.10
      OBSERVER_GW:    172.20.0.2
      INTER_PACKET_DELAY_MS:  ${INTER_PACKET_DELAY_MS:-0}
      DELAY_EVERY_N:          ${DELAY_EVERY_N:-10}
      TRAFFIC_SCENARIO:       ${TRAFFIC_SCENARIO:-bulk}
      QUIC_WAIT_TIMEOUT_S:    ${QUIC_WAIT_TIMEOUT_S:-240}
      RUST_LOG: ${RUST_LOG:-}
    volumes:
      - eval_keys:/keys
    depends_on:
      observer:
        condition: service_healthy
      server:
        condition: service_healthy
    restart: "no"

  chaos:
    init: true
    profiles: ["chaos"]
    image: typhoon-eval-chaos
    build:
      context: ../chaos
    environment:
      CHAOS_DELAY_MS:
      CHAOS_JITTER_MS:
      CHAOS_LOSS_PCT:
      CHAOS_BW_MBPS:
    network_mode: "service:observer"
    cap_add:
      - NET_ADMIN
    depends_on:
      observer:
        condition: service_healthy
