name: Lint

permissions:
  contents: read

on:
  push:
    paths:
      - 'typhoon/**'
      - 'evaluation/**'
      - '.github/workflows/lint.yaml'
      - '.shellcheckrc'
      - '**.md'
      - '**.go'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  all-lint:
    name: Lint All the Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Rust 🦀
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rustfmt, clippy
          rust-src-dir: typhoon
          override: true

      - name: Setup Python 🐍
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Setup Go 🐹
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Check formatting 🎨
        run: |
          cd typhoon && cargo fmt --check
          cd ../evaluation/protocols/typhoon && cargo fmt --check
          cd ../wireguard_daita/machines-printer && cargo fmt --check

      - name: Run clippy 📎
        working-directory: typhoon
        run: cargo clippy

      - name: Check shell scripts 🐚
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."
        env:
          SHELLCHECK_OPTS: -s bash

      - name: Check Dockerfile configuration 📦
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          config: evaluation/.hadolint.yaml

      - name: Check Python code 📜
        uses: astral-sh/ruff-action@v3
        with:
          args: "check evaluation/src evaluation/protocols"

      - name: Lint Go (wireguard_daita) 🔍
        working-directory: evaluation/protocols/wireguard_daita/wg-daita
        run: |
          git clone --depth=1 --branch mullvad https://github.com/mullvad/wireguard-go evaluation/protocols/wireguard_daita/wireguard-go
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go mod tidy
          staticcheck -tags daita ./...

      - name: Lint markdown 📝
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'
