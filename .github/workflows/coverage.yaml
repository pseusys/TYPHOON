name: Coverage

permissions:
  contents: read

on:
  push:
    paths:
      - 'typhoon/**'
      - '.github/workflows/coverage.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  typhoon-coverage:
    name: Measure TYPHOON Test Coverage
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Rust 🦀
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.89.0"
          components: llvm-tools-preview
          rust-src-dir: typhoon
          override: true

      - name: Install cargo-llvm-cov 📦
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Run unit tests with coverage 🧪
        working-directory: typhoon
        run: cargo llvm-cov --no-report

      - name: Run network integration tests with coverage 🌐
        working-directory: typhoon
        run: cargo llvm-cov --no-report --test network -- --test-threads=1

      - name: Merge coverage and generate LCOV 📊
        working-directory: typhoon
        run: cargo llvm-cov report --lcov --output-path lcov.info

      - name: Generate HTML report 📊
        working-directory: typhoon
        run: cargo llvm-cov report --html --output-dir coverage-html

      - name: Upload LCOV report 📤
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: typhoon/lcov.info
          retention-days: 3

      - name: Upload HTML report 📤
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: typhoon/coverage-html/
          retention-days: 3

      - name: Print coverage summary 📋
        working-directory: typhoon
        run: cargo llvm-cov report --summary-only
