name: Evaluation

on:
  push:
    paths:
      - 'typhoon/**'
      - 'evaluation/**'
      - '.github/workflows/evaluation.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  evaluate:
    name: Run Full Evaluation Pipeline (Validation Scale)
    runs-on: ubuntu-24.04
    timeout-minutes: 240

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Free disk space 🧹
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          docker image prune -af

      - name: Setup Rust 🦀
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.89.0"
          rust-src-dir: typhoon
          override: true

      - name: Install perf and flamegraph 🔥
        run: |
          sudo apt-get update
          sudo apt-get install -y linux-tools-common linux-tools-generic librsvg2-bin
          echo -1 | sudo tee /proc/sys/kernel/perf_event_paranoid
          cargo install flamegraph

      - name: Setup Python 🐍
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install Poetry 📦
        run: pipx install poetry

      - name: Install evaluation dependencies 📦
        working-directory: evaluation
        run: poetry install

      - name: Restore evaluation image cache 💾
        id: evaluation-images-cache
        uses: actions/cache@v4
        with:
          path: /tmp/docker-cache/evaluation-images.tar
          key: evaluation-images-${{ runner.os }}-${{ hashFiles('evaluation/compose/docker-compose.build.yml', 'evaluation/protocols/**', 'typhoon/src/**', 'typhoon/Cargo.toml', 'typhoon/Cargo.lock', 'evaluation/background/compose/docker-compose.build.yml', 'evaluation/background/**') }}

      - name: Load evaluation images 📦
        if: steps.evaluation-images-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-cache/evaluation-images.tar

      - name: Build evaluation images 🏗️
        working-directory: evaluation
        env:
          DOCKER_BUILDKIT: 0
        run: |
          poetry poe build
          poetry poe background-build

      - name: Save evaluation images to cache 💾
        if: steps.evaluation-images-cache.outputs.cache-hit != 'true'
        working-directory: evaluation
        run: |
          mkdir -p /tmp/docker-cache
          docker save -o /tmp/docker-cache/evaluation-images.tar $(docker compose -f compose/docker-compose.build.yml config --images) $(docker compose -f background/compose/docker-compose.build.yml config --images)

      - name: Run full evaluation pipeline 🧪
        working-directory: evaluation
        run: poetry poe evaluate --skip build --classification-runs 1 --typhoon-runs 2 --typhoon-uc-runs 1 --typhoon-traffic-runs 1 --background-runs 15 --quiet-build

      - name: Upload evaluation artifacts 📈
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-artifacts
          path: artifacts/
          retention-days: 5
