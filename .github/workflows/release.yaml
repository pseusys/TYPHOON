name: Release

permissions:
  contents: read

on:
  release:
    types: 
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-crate:
    name: Publish TYPHOON Crate to crates.io
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Rust 🦀
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.89.0"
          rust-src-dir: typhoon
          override: true

      - name: Check release tag matches crate version 🏷️
        working-directory: typhoon
        run: |
          CRATE_VERSION="$(grep -m1 '^version' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "${CRATE_VERSION}" != "${TAG_VERSION}" ]; then
            echo "Cargo.toml version (${CRATE_VERSION}) does not match release tag (${GITHUB_REF_NAME})" >&2
            exit 1
          fi

      - name: Publish to crates.io 📦
        working-directory: typhoon
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
