name: Benchmarks

on:
  push:
    branches: [main]
    paths:
      - 'typhoon/**'
      - '.github/workflows/benchmarks.yaml'
  pull_request:
    paths:
      - 'typhoon/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  benchmark:
    name: Run and Store TYPHOON Benchmarks
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Rust 🦀
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.89.0"
          rust-src-dir: typhoon
          override: true

      - name: Pre-generate server key pair 🔑
        working-directory: typhoon
        run: cargo run --quiet --bin typhoon-gen-key --no-default-features --features fast_software,server,tokio,clap -- .bench_keys/server_fast.key
        env:
          RUSTFLAGS: "-D warnings"

      - name: Run benchmarks 📊
        working-directory: typhoon
        env:
          TYPHOON_TEST_SERVER_KEY_FAST: .bench_keys/server_fast.key
        run: cargo bench --bench roundtrip -- --output-format bencher | tee ../bench-output.txt

      - name: Store benchmark results 📈
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench-output.txt
          retention-days: 5

  flamegraph:
    name: Generate TYPHOON Example Flamegraphs
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Rust 🦀
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.89.0"
          rust-src-dir: typhoon
          override: true

      - name: Install perf and flamegraph 🔥
        run: |
          sudo apt-get install -y linux-tools-common linux-tools-generic
          echo -1 | sudo tee /proc/sys/kernel/perf_event_paranoid
          cargo install flamegraph

      - name: Generate flamegraphs 📊
        working-directory: typhoon
        env:
          RUSTFLAGS: "-D warnings"
        run: |
          mkdir -p ../flamegraphs
          for example in hello_world multi_flow multi_client long_session heavy_traffic; do
            cargo flamegraph --example "$example" -o "../flamegraphs/${example}.svg" || true
          done

      - name: Upload flamegraphs 📈
        uses: actions/upload-artifact@v4
        with:
          name: flamegraphs
          path: flamegraphs/
          retention-days: 5

  plotting:
    name: Generate TYPHOON Example Plots
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install Python and matplotlib 🐍
        run: pip install matplotlib numpy click rich

      - name: Generate flow diagrams 📉
        env:
          RUSTFLAGS: "-D warnings"
          PYTHONPATH: evaluation/src
        run: |
          mkdir -p flow-diagrams
          for example in hello_world multi_flow multi_client long_session heavy_traffic; do
            python -m typhoon_eval.flow_plot --example "$example" --typhoon-dir typhoon --out-dir "flow-diagrams/${example}" --per-packet || true
          done

      - name: Upload flow diagrams 📈
        uses: actions/upload-artifact@v4
        with:
          name: flow-diagrams
          path: flow-diagrams/
          retention-days: 5

